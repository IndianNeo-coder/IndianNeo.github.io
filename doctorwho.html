<!DOCTYPE html>
<html>

<head>

<title>TARDIS Archives</title>


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;

    min-height:100vh;

    background:
    radial-gradient(circle at center,#003b4d,#000 70%);

    color:white;

    font-family:"Courier New",monospace;

    text-align:center;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

}



body::before{

    content:"";

    position:absolute;

    width:100%;

    height:100%;


    background-image:
    radial-gradient(white 1px,transparent 1px);


    background-size:40px 40px;


    opacity:.25;


    animation:stars 20s linear infinite;

}



@keyframes stars{

from{
transform:translateY(0);
}

to{
transform:translateY(40px);
}

}





.container{

    position:relative;

    width:80%;

    max-width:800px;

    padding:50px;


    background:
    rgba(0,0,0,.8);


    border:

    3px solid cyan;


    border-radius:20px;


    box-shadow:

    0 0 30px cyan,

    inset 0 0 30px #003b4d;


}




h1{

    font-size:50px;

    letter-spacing:8px;

    color:#00ffff;


    text-shadow:

    0 0 10px cyan,

    0 0 30px blue;

}



.subtitle{

    color:#aaa;

    letter-spacing:3px;

}




input{


    margin-top:30px;

    padding:15px;


    width:70%;


    background:black;


    color:white;


    border:

    2px solid cyan;


    border-radius:10px;


    font-family:"Courier New";


    font-size:18px;


    text-align:center;

}



input:focus{


    outline:none;


    box-shadow:

    0 0 20px cyan;


}





button{


    margin-top:25px;


    padding:15px 30px;


    background:black;


    color:white;


    border:

    2px solid cyan;


    border-radius:10px;


    font-family:"Courier New";


    font-size:18px;


    cursor:pointer;


    transition:.3s;


}



button:hover{


    background:cyan;

    color:black;


    box-shadow:

    0 0 25px cyan;


}





.card{


    display:block;


    margin:30px auto;


    width:350px;


    padding:25px;


    background:

    rgba(0,30,40,.8);


    border:

    2px solid cyan;


    border-radius:15px;


    color:white;


    text-decoration:none;


    font-size:25px;


    transition:.4s;


}




.card:hover{


    transform:scale(1.1);


    background:#004455;


    box-shadow:

    0 0 30px cyan;


}




.status{


    color:#00ff99;


    animation:pulse 2s infinite;

}



@keyframes pulse{


50%{

opacity:.4;

}


}




#error{


    color:red;

    margin-top:20px;

    font-weight:bold;


}


small{

    font-size:14px;

    color:#aaa;

}


</style>


</head>



<body>



<div class="container" id="login">


<h1>
TARDIS ARCHIVES
</h1>


<p class="subtitle">

TIME LORD DATABASE // RESTRICTED ACCESS

</p>



<input
id="password"
type="password"
placeholder="ENTER TARDIS CODE">



<br>



<button onclick="checkPassword()">

ACCESS ARCHIVES

</button>



<p id="error"></p>


</div>






<div class="container" id="archive" style="display:none;">


<h1>
TARDIS ARCHIVES
</h1>



<p class="subtitle">

TIME LORD DATABASE // ACCESS GRANTED

</p>




<a class="card" href="dont-blink.html">


 DON'T BLINK


<br>


<small>
Weeping Angel Survival Protocol
</small>


</a>




<p class="status">

🟢 TARDIS SYSTEM ONLINE

</p>




<button onclick="window.location.href='secret.html'">

⬅ Return to Secret Archive

</button>



</div>






<script>


function checkPassword(){


let entered =
document.getElementById("password").value;



if(entered === "TARDIS"){


document.getElementById("login").style.display="none";


document.getElementById("archive").style.display="block";


}



else{


document.getElementById("error").innerHTML=

"⚠ ACCESS DENIED // INVALID CODE";


}



}



</script>



</body>

</html>



</body>

</html>
