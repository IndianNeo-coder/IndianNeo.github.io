<!DOCTYPE html>
<html>

<head>

<title>TARDIS Archives</title>


<style>


*{
    box-sizing:border-box;
}



body{


    margin:0;

    min-height:100vh;


    background:

    radial-gradient(circle at center,
    #003b4d,
    #000 70%);


    color:white;


    font-family:"Courier New", monospace;


    text-align:center;


    display:flex;


    justify-content:center;


    align-items:center;


    overflow:hidden;


}



/* Background stars */


body::before{


    content:"";


    position:absolute;


    width:100%;

    height:100%;


    background-image:

    radial-gradient(white 1px,transparent 1px);


    background-size:

    40px 40px;


    opacity:.25;


    animation:

    stars 20s linear infinite;


}



@keyframes stars{


from{

transform:translateY(0);

}


to{

transform:translateY(40px);

}


}




.container{


    position:relative;


    width:80%;


    max-width:800px;


    padding:50px;


    background:

    rgba(0,0,0,.75);



    border:

    3px solid #00ffff;


    border-radius:20px;



    box-shadow:


    0 0 30px cyan,

    inset 0 0 30px #003b4d;


}





h1{


    font-size:55px;


    letter-spacing:8px;


    color:#00ffff;


    text-shadow:


    0 0 10px cyan,


    0 0 30px blue;


}





.subtitle{


    color:#aaa;


    letter-spacing:4px;


}




h2{


    margin-top:40px;


    color:#ddd;


}






/* Simulation cards */


.card{


    display:block;


    margin:25px auto;


    width:350px;


    padding:25px;



    background:

    rgba(0,20,30,.8);



    border:

    2px solid cyan;


    border-radius:15px;



    color:white;


    text-decoration:none;


    font-size:25px;


    transition:.4s;


}





.card:hover{


    transform:scale(1.1);


    background:#004455;


    box-shadow:


    0 0 30px cyan;


}






.status{


    margin-top:30px;


    color:#00ff99;


    font-size:18px;


    animation:

    pulse 2s infinite;


}




@keyframes pulse{


50%{

opacity:.4;

}


}






button{


    margin-top:35px;


    padding:15px 30px;


    background:black;


    color:white;


    border:


    2px solid cyan;


    border-radius:10px;


    font-family:"Courier New";


    font-size:18px;


    cursor:pointer;


}



button:hover{


    background:cyan;


    color:black;


    box-shadow:


    0 0 20px cyan;


}




</style>


</head>



<body>




<div class="container">



<h1>

TARDIS ARCHIVES

</h1>



<p class="subtitle">

TIME LORD DATABASE // CLASSIFIED SIMULATIONS // CLASSIFIED HISTORY

</p>




<h2>

Choose a Simulation

</h2>





<a class="card" href="dont-blink.html">

DON'T BLINK

<br>

<small>
Weeping Angel Survival Protocol
</small>


</a>





<p class="status">

🟢 TARDIS SYSTEM ONLINE

</p>




<button onclick="window.location.href='secret.html'">

⬅ Return to Secret Archive

</button>




</div>



</body>

</html>
