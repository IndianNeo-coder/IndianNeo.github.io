<!DOCTYPE html>
<html>

<head>

<title>Don't Blink</title>

<style>

body {
    background:
    radial-gradient(circle at center, #1a1a1a 0%, #000000 70%);
    color: #d8d8d8;
    text-align: center;
    font-family: "Courier New", monospace;
    margin: 0;
    overflow-x: hidden;
}

/* Title */
h1 {
    color: #bcbcbc;
    font-size: 42px;
    letter-spacing: 6px;
    text-shadow:
    0 0 10px #ffffff,
    0 0 20px #777;
}


/* Instructions */
p {
    color: #888;
    font-size: 18px;
}



/* HUD */
#stats {

    font-size: 22px;
    color: #ddd;

    background: rgba(0,0,0,0.6);

    border: 1px solid #555;

    padding: 12px;

    width: 350px;

    margin: 15px auto;

    border-radius: 10px;

    box-shadow:
    0 0 20px black;

}



/* Game screen */

canvas {

    background:

    linear-gradient(
    90deg,
    #050505,
    #111,
    #050505
    );

    border:

    3px solid #666;


    box-shadow:

    0 0 30px black,

    inset 0 0 40px #000;


}



/* Buttons */

button {

    background:#111;

    color:white;

    border:2px solid #777;

    padding:15px 30px;

    font-size:20px;

    cursor:pointer;

    font-family:"Courier New";

    transition:0.3s;

}


button:hover {

    background:#444;

    box-shadow:

    0 0 20px white;

}



/* Makes the whole game feel darker */

html {

    background:black;

}



/* Scrollbar removal */

::-webkit-scrollbar {

    display:none;

}

</style>

</head>


<body>

<h1>DON'T BLINK</h1>

<button onclick="window.location.href='secret.html'">
⬅ Back to Secret Archive
</button>

<p>
Arrow keys = Move<br>
Hold SPACE = Blink (Angels move)
</p>

<div id="stats"></div>

<canvas id="game" width="800" height="500"></canvas>


<script>


const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");



let player={
x:400,
y:250,
size:18,
speed:4
};



let keys={};

let blinking=false;

let forcedBlink=false;

let eyePower=100;

let time=0;

let highScore=0;

let lives=3;

let gameOver=false;



let angels=[];



let obstacles=[

{
x:150,
y:100,
width:100,
height:30
},

{
x:500,
y:300,
width:150,
height:40
},

{
x:300,
y:400,
width:60,
height:80
}

];



for(let i=0;i<3;i++){

spawnAngel();

}



function spawnAngel(){

angels.push({

x:Math.random()*750,
y:Math.random()*450,
speed:6

});

}




document.addEventListener("keydown",e=>{


keys[e.key]=true;


if(e.code==="Space")
blinking=true;


});



document.addEventListener("keyup",e=>{


keys[e.key]=false;


if(e.code==="Space")
blinking=false;


});






function collision(rect){


for(let o of obstacles){


if(

rect.x < o.x+o.width &&
rect.x+rect.size > o.x &&
rect.y < o.y+o.height &&
rect.y+rect.size > o.y

){

return true;

}


}


return false;

}







function movePlayer(){


let oldX=player.x;
let oldY=player.y;



if(keys["ArrowUp"])
player.y-=player.speed;


if(keys["ArrowDown"])
player.y+=player.speed;


if(keys["ArrowLeft"])
player.x-=player.speed;


if(keys["ArrowRight"])
player.x+=player.speed;




if(collision(player)){

player.x=oldX;
player.y=oldY;

}




player.x=Math.max(
0,
Math.min(canvas.width,player.x)
);


player.y=Math.max(
0,
Math.min(canvas.height,player.y)
);



}





function updateEyes(){


if(!blinking){

eyePower-=0.08;

}

else{

eyePower+=0.5;

}



eyePower=Math.max(
0,
Math.min(100,eyePower)
);



if(eyePower<=0){


forcedBlink=true;

eyePower=100;



setTimeout(()=>{

forcedBlink=false;

},2000);


}



}





function moveAngels(){



if(blinking || forcedBlink){



angels.forEach(a=>{


let dx=player.x-a.x;

let dy=player.y-a.y;


let dist=Math.sqrt(
dx*dx+dy*dy
);



a.x+=(dx/dist)*a.speed;

a.y+=(dy/dist)*a.speed;



a.speed+=0.01;



if(dist<25){


lives--;



a.x=Math.random()*750;

a.y=Math.random()*450;



if(lives<=0){

angelCaught();

}


}


});


}



}






function angelCaught(){


gameOver=true;


document.body.innerHTML=`

<h1>🗿 THE ANGEL GOT YOU</h1>

<img src="weeping-angel.jpg"
style="
width:90vw;
height:80vh;
object-fit:contain;
">

<h2>
Survival Time: ${time} seconds
</h2>

<button onclick="location.reload()">
Try Again
</button>

`;

}







function draw(){


ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



// obstacles

ctx.fillStyle="#444";


obstacles.forEach(o=>{


ctx.fillRect(
o.x,
o.y,
o.width,
o.height
);


});




// player

ctx.fillStyle="cyan";


ctx.beginPath();


ctx.arc(
player.x,
player.y,
player.size,
0,
Math.PI*2
);


ctx.fill();





// angels

ctx.font="40px Arial";


angels.forEach(a=>{


ctx.fillText(
"🗿",
a.x,
a.y
);


});






if(blinking || forcedBlink){


ctx.fillStyle="black";

ctx.fillRect(
0,
0,
800,
500
);


ctx.fillStyle="white";

ctx.font="30px Arial";


ctx.fillText(
"👁 BLINKING...",
280,
250
);


}



}







function updateHUD(){


document.getElementById("stats").innerHTML=

"Time: "+time+
" seconds"+
"<br>High Score: "+highScore+
"<br>Lives: "+
"❤️".repeat(lives)+
"<br>Eye Power: "+
Math.floor(eyePower)+"%";


}






setInterval(()=>{


if(!gameOver){

time++;


if(time>highScore)
highScore=time;



if(time%20===0){

spawnAngel();

}


}


},1000);








function loop(){


if(!gameOver){


movePlayer();

updateEyes();

moveAngels();

draw();

updateHUD();


requestAnimationFrame(loop);


}


}


loop();



</script>


</body>

</html>
