<!DOCTYPE html>
<html>

<head>

<title>Don't Blink</title>

<style>

body {
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
}

canvas {
    background:#080808;
    border:3px solid #555;
}

h1 {
    color:#aaa;
}

#stats {
    font-size:22px;
}

</style>

</head>


<body>


<h1>👁 DON'T BLINK</h1>

<p>
Arrow keys = Move<br>
Hold SPACE = Blink (Angels move)
</p>


<div id="stats"></div>


<canvas id="game" width="800" height="500"></canvas>



<script>


const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");



let player={

x:400,
y:250,
size:18,
speed:4

};



let keys={};

let blinking=false;

let forcedBlink=false;

let eyePower=100;

let lives=3;

let time=60;


let angels=[];



for(let i=0;i<3;i++){

spawnAngel();

}



function spawnAngel(){

angels.push({

x:Math.random()*750,
y:Math.random()*450,
speed:0.6

});

}




// controls

document.addEventListener("keydown",e=>{


keys[e.key]=true;


if(e.code==="Space"){

blinking=true;

}


});



document.addEventListener("keyup",e=>{


keys[e.key]=false;


if(e.code==="Space"){

blinking=false;

}


});





function movePlayer(){


if(keys["ArrowUp"])
player.y-=player.speed;


if(keys["ArrowDown"])
player.y+=player.speed;


if(keys["ArrowLeft"])
player.x-=player.speed;


if(keys["ArrowRight"])
player.x+=player.speed;



player.x=Math.max(
0,
Math.min(canvas.width,player.x)
);


player.y=Math.max(
0,
Math.min(canvas.height,player.y)
);


}




function updateEyes(){


if(!blinking){

eyePower-=0.08;

}

else{

eyePower+=0.5;

}



eyePower=Math.max(
0,
Math.min(100,eyePower)
);



if(eyePower<=0){


forcedBlink=true;


eyePower=100;


setTimeout(()=>{

forcedBlink=false;

},2000);


}


}




function moveAngels(){



if(blinking || forcedBlink){



angels.forEach(a=>{


let dx=player.x-a.x;

let dy=player.y-a.y;


let distance=Math.sqrt(
dx*dx+dy*dy
);



a.x+=(dx/distance)*a.speed;

a.y+=(dy/distance)*a.speed;



if(distance<25){


lives--;


a.x=Math.random()*750;

a.y=Math.random()*450;



if(lives<=0){


alert("THE ANGELS GOT YOU 🗿");

location.reload();


}


}



});

}



}




function draw(){



ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);



// background dust

for(let i=0;i<50;i++){

ctx.fillStyle="#333";

ctx.fillRect(
Math.random()*800,
Math.random()*500,
2,
2
);

}




// player

ctx.fillStyle="cyan";

ctx.beginPath();

ctx.arc(
player.x,
player.y,
player.size,
0,
Math.PI*2
);

ctx.fill();




// angels


ctx.font="40px Arial";


angels.forEach(a=>{


ctx.fillText(
"🗿",
a.x,
a.y
);


});




// blink screen

if(blinking || forcedBlink){


ctx.fillStyle="black";

ctx.fillRect(
0,
0,
800,
500
);


ctx.fillStyle="white";

ctx.font="30px Arial";

ctx.fillText(
"👁 BLINKING...",
280,
250
);


}




}




function updateHUD(){


document.getElementById("stats").innerHTML=

"Time: "+time+
" | Lives: "+
"❤️".repeat(lives)+
"<br>Eye Power: "+
Math.floor(eyePower)+"%";


}




setInterval(()=>{


if(time>0){

time--;

}


else{

alert("YOU SURVIVED THE ANGELS!");

location.reload();

}



if(time%15===0){

spawnAngel();

}


},1000);






function gameLoop(){


movePlayer();

updateEyes();

moveAngels();

draw();

updateHUD();


requestAnimationFrame(gameLoop);


}


gameLoop();



</script>


</body>

</html>

</script>

</body>
</html>
