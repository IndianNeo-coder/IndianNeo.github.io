<!DOCTYPE html>
<html>
<head>
<title>Secret Archive</title>

<style>
body {
    background: #050505;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 100px;
}

.box {
    background: #111;
    border: 2px solid #00aaff;
    border-radius: 15px;
    width: 350px;
    margin: auto;
    padding: 30px;
}

input {
    padding: 10px;
    width: 200px;
}

button {
    padding: 10px 20px;
    margin-top: 15px;
    background: #00aaff;
    border: none;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #0077aa;
}

#error {
    color: red;
}

</style>

</head>


<body>


<div class="box">

<h1>🔒 Secret Archive</h1>

<p>Restricted Access</p>

<input id="password" type="password" placeholder="Enter password">

<br>

<button onclick="login()">Access</button>

<p id="error"></p>

</div>



<script>

function login(){

let password =
document.getElementById("password").value;


// CHANGE THIS PASSWORD
if(password === "TARDIS"){

window.location.href="doctorwho.html";

}

else{

document.getElementById("error").innerHTML=
"Access denied. Wrong Code.";

}

}

</script>


</body>
</html>
