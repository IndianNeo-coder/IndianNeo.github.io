<!DOCTYPE html>
<html>

<head>

<title>Secret Archive</title>


<style>

*{
    box-sizing:border-box;
}


body {

    background:
    radial-gradient(circle at center,#1a1a1a,#000);

    color:white;

    font-family:"Courier New", monospace;

    text-align:center;

    margin:0;

    min-height:100vh;

    display:flex;

    align-items:center;

    justify-content:center;

}



/* Main terminal */

.box {

    width:80%;

    max-width:700px;

    padding:50px;


    background:

    rgba(0,0,0,0.85);


    border:

    2px solid #555;


    border-radius:20px;


    box-shadow:

    0 0 40px black,

    inset 0 0 30px #111;


    animation:

    fadeIn 1s;

}




@keyframes fadeIn{

from{

opacity:0;

transform:scale(.8);

}

to{

opacity:1;

transform:scale(1);

}

}




/* Title */


h1 {

    font-size:50px;

    letter-spacing:8px;


    color:#ddd;


    text-shadow:

    0 0 10px white,

    0 0 25px #777;


}



.subtitle{

    color:#888;

    font-size:18px;

    letter-spacing:3px;

}




/* Input */


input {


    margin-top:30px;


    width:70%;


    padding:15px;


    background:#050505;


    color:white;


    border:

    2px solid #555;


    border-radius:10px;


    font-size:18px;


    font-family:"Courier New";


    text-align:center;


}



input:focus {


    outline:none;


    border-color:white;


    box-shadow:

    0 0 15px white;


}




/* Button */


button {


    margin-top:20px;


    padding:15px 35px;


    background:#111;


    color:white;


    border:

    2px solid #777;


    border-radius:10px;


    font-size:20px;


    font-family:"Courier New";


    cursor:pointer;


    transition:.3s;


}



button:hover {


    background:white;


    color:black;


    box-shadow:

    0 0 25px white;


    transform:scale(1.08);


}




#error {


    color:#ff4444;

    margin-top:20px;

    font-weight:bold;


}



/* Loading effect */


#loading {


    display:none;

    color:#00ff99;

    margin-top:25px;

    font-size:18px;


}



.scan {


    animation:

    blink 1s infinite;

}



@keyframes blink{


50%{

opacity:.3;

}


}





/* Archive unlocked */


.archive {


    display:none;

}



.file {


    background:#111;

    border:

    1px solid #555;


    padding:20px;

    margin:20px;


    border-radius:10px;


    transition:.3s;


}



.file:hover {


    border-color:white;

    transform:scale(1.05);

}




a {


    color:white;

    text-decoration:none;


}





</style>


</head>



<body>



<div class="box">


<h1>
🔒 SECRET ARCHIVE
</h1>


<p class="subtitle">
CLASSIFIED DATABASE // RESTRICTED ACCESS
</p>



<input 
id="password"
type="password"
placeholder="ENTER FETCHING CODE">



<br>



<button onclick="login()">

AUTHENTICATE

</button>



<p id="error"></p>


<div id="loading">

<span class="scan">
ACCESSING ARCHIVE...
</span>

<br>

Decrypting files...

</div>



<div class="archive" id="archive">


<h2>
📁 ARCHIVE UNLOCKED
</h2>



<div class="file">

<a href="doctorwho.html">

🌀 Doctor Who Files

</a>

</div>



<div class="file">

<a href="dont-blink.html">

🗿 Experimental Simulation:
DON'T BLINK

</a>

</div>



</div>



</div>




<script>


function login(){


let password=document.getElementById("password").value;



if(password==="TARDIS"){


document.getElementById("loading").style.display="block";



setTimeout(()=>{


document.querySelector(".box").innerHTML=`

<h1>
✅ ACCESS GRANTED
</h1>

<p class="subtitle">
WELCOME, AUTHORIZED USER
</p>


<h2>
📁 SECRET ARCHIVE OPENED
</h2>


<div class="file">

<a href="doctorwho.html">

🌀 Doctor Who Files

</a>

</div>


<div class="file">

<a href="dont-blink.html">

🗿 Don't Blink

</a>

</div>


`;



},2500);



}



else{


document.getElementById("error").innerHTML=

"⚠ ACCESS DENIED // INVALID CODE";


}


}



</script>



</body>

</html>
