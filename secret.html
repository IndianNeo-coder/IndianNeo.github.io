<!DOCTYPE html>
<html>
<head>
<title>Secret Archive</title>

<style>
body {

    background:
    linear-gradient(135deg, #050505, #151515);

    color:white;

    font-family:"Courier New", monospace;

    text-align:center;

    margin:0;

    min-height:100vh;

}



/* Secret archive title */

h1 {

    font-size:45px;

    letter-spacing:6px;

    color:#e0e0e0;

    text-shadow:

    0 0 10px white,

    0 0 25px #555;

}



/* Archive box */

.archive {

    width:75%;

    margin:50px auto;

    padding:35px;


    background:

    rgba(0,0,0,0.7);


    border:

    2px solid #777;


    border-radius:15px;


    box-shadow:

    0 0 30px black;


}



/* Secret files */

a {

    display:block;

    margin:20px auto;

    padding:18px;


    width:300px;


    background:#111;


    color:white;


    text-decoration:none;


    border:

    2px solid #555;


    border-radius:8px;


    font-size:20px;


    transition:0.3s;

}



a:hover {

    background:#222;

    border-color:white;

    transform:scale(1.05);

    box-shadow:0 0 15px white;

}



/* Back button */

button {

    background:#111;

    color:white;

    border:2px solid #777;

    padding:12px 25px;

    font-family:"Courier New";

    cursor:pointer;

}


button:hover {

    background:#333;

}

#error {
    color: red;
}

</style>

</head>


<body>


<div class="box">

<h1>🔒 Secret Archive</h1>

<p>Restricted Access</p>

<input id="password" type="password" placeholder="Enter password">

<br>

<button onclick="login()">Access</button>

<p id="error"></p>

</div>



<script>

function login(){

let password =
document.getElementById("password").value;


// CHANGE THIS PASSWORD
if(password === "TARDIS"){

window.location.href="doctorwho.html";

}

else{

document.getElementById("error").innerHTML=
"Access denied. Wrong Code.";

}

}

</script>


</body>
</html>
